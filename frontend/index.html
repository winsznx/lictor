<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LICTOR — Autonomous trading desk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet" />
    <style>
      #boot { position: fixed; inset: 0; background: #08090a; display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity .3s; }
      #boot.gone { opacity: 0; pointer-events: none; }
      .boot-dot { width: 6px; height: 6px; border-radius: 50%; background: #3d7bff; animation: bpulse 1.1s ease-in-out infinite; }
      @keyframes bpulse { 0%,100% { opacity:.3 } 50% { opacity:1 } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot"><div class="boot-dot"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
